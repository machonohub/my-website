<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>お誕生日ゲーム</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Zen+Maru+Gothic:wght@400;700&display=swap');

  :root {
    --bg: #0a0a1a;
    --green: #00ff88;
    --pink: #ff2d78;
    --yellow: #ffe600;
    --blue: #00cfff;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Press Start 2P', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    touch-action: none;
  }

  /* URLメーカー表示時だけスクロールを許可（画面が低いPCでもボタンが押せるように） */
  body.scrollable {
    overflow-y: auto;
    touch-action: auto;
    justify-content: flex-start;
  }
  body.scrollable #guide-screen {
    margin: auto;
    padding-top: 32px;
    padding-bottom: 32px;
  }

  /* ===== GUIDE SCREEN (URLパラメータなし時) ===== */
  #guide-screen {
    display: none;
    text-align: center;
    padding: 24px;
    max-width: 92vw;
    animation: fadeIn 1s ease;
  }
  #guide-screen h1 {
    font-size: clamp(14px, 4.5vw, 22px);
    color: var(--pink);
    text-shadow: 0 0 20px var(--pink);
    margin-bottom: 24px;
    line-height: 1.6;
  }
  #guide-screen p {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: clamp(13px, 3.5vw, 16px);
    color: var(--white);
    margin-bottom: 20px;
    line-height: 1.8;
  }
  #maker-box {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 24px;
    display: inline-block;
    width: min(440px, 88vw);
  }
  #name-input {
    width: 100%;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 16px;
    padding: 12px 14px;
    background: rgba(0,0,0,0.4);
    border: 2px solid var(--blue);
    border-radius: 8px;
    color: var(--white);
    outline: none;
    margin-bottom: 14px;
  }
  #name-input:focus { box-shadow: 0 0 12px var(--blue); }
  #genre-label {
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
    text-align: left;
    margin-bottom: 8px;
  }
  #genre-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
  }
  .genre-btn {
    font-family: 'Zen Maru Gothic', sans-serif;
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 10px 14px;
    background: rgba(0,0,0,0.4);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 8px;
    color: var(--white);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .genre-btn .genre-emoji { font-size: 22px; }
  .genre-btn .genre-text {
    font-size: 13px;
    line-height: 1.5;
    color: rgba(255,255,255,0.7);
  }
  .genre-btn .genre-text strong {
    font-size: 14px;
    color: var(--white);
  }
  .genre-btn.selected {
    border-color: var(--yellow);
    background: rgba(255,230,0,0.08);
    box-shadow: 0 0 10px rgba(255,230,0,0.4);
  }
  .genre-btn.selected .genre-text strong { color: var(--yellow); }
  #make-btn, #copy-btn {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 15px;
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    background: transparent;
    border: 2px solid var(--green);
    color: var(--green);
    transition: all 0.15s;
  }
  #make-btn:hover, #make-btn:active,
  #copy-btn:hover, #copy-btn:active {
    background: var(--green);
    color: #000;
  }
  #result-area { margin-top: 18px; }
  #result-url {
    font-family: monospace;
    font-size: 13px;
    color: var(--yellow);
    background: rgba(0,0,0,0.4);
    border: 1px dashed rgba(255,255,255,0.3);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
    word-break: break-all;
    text-align: left;
    line-height: 1.6;
  }
  #copy-btn { border-color: var(--pink); color: var(--pink); }
  #copy-btn:hover, #copy-btn:active { background: var(--pink); color: #000; }
  #test-link {
    display: inline-block;
    margin-top: 14px;
    font-size: 13px;
    color: var(--blue);
  }

  /* ===== TITLE SCREEN ===== */
  #title-screen {
    display: none;
    text-align: center;
    padding: 20px;
    animation: fadeIn 1s ease;
  }
  #title-screen h1 {
    font-size: clamp(12px, 4vw, 20px);
    color: var(--green);
    text-shadow: 0 0 20px var(--green);
    line-height: 2;
    margin-bottom: 30px;
  }
  #title-screen p {
    font-size: clamp(8px, 2.5vw, 12px);
    color: var(--yellow);
    margin-bottom: 40px;
    line-height: 2;
  }
  #start-btn {
    background: transparent;
    border: 3px solid var(--pink);
    color: var(--pink);
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 3vw, 14px);
    padding: 16px 32px;
    cursor: pointer;
    text-shadow: 0 0 10px var(--pink);
    box-shadow: 0 0 20px var(--pink);
    animation: blink 1s step-end infinite;
    transition: all 0.2s;
  }
  #start-btn:hover, #start-btn:active {
    background: var(--pink);
    color: #000;
    animation: none;
  }

  /* ===== GAME SCREEN ===== */
  #game-screen { display: none; width: 100%; flex-direction: column; align-items: center; }

  #hud {
    display: flex;
    justify-content: space-between;
    width: min(380px, 96vw);
    padding: 8px 4px;
    font-size: clamp(7px, 2vw, 10px);
    color: var(--green);
  }

  #canvas {
    border: 2px solid var(--green);
    box-shadow: 0 0 30px var(--green), inset 0 0 30px rgba(0,255,136,0.05);
    background: #050510;
    display: block;
    image-rendering: pixelated;
  }

  /* Mobile Controls */
  #controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: min(380px, 96vw);
    margin-top: 16px;
    gap: 10px;
  }
  .ctrl-btn {
    background: rgba(0,255,136,0.1);
    border: 2px solid var(--green);
    color: var(--green);
    font-family: 'Press Start 2P', monospace;
    font-size: 18px;
    width: 64px; height: 64px;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .ctrl-btn:active {
    background: rgba(0,255,136,0.4);
  }
  #fire-btn {
    background: rgba(255,45,120,0.15);
    border-color: var(--pink);
    color: var(--pink);
    width: 80px; height: 64px;
    font-size: 12px;
  }
  #fire-btn:active { background: rgba(255,45,120,0.5); }

  /* ===== CLEAR SCREEN ===== */
  #clear-screen {
    display: none;
    text-align: center;
    padding: 20px;
    max-width: 90vw;
  }
  #clear-title {
    font-size: clamp(14px, 5vw, 28px);
    color: var(--yellow);
    text-shadow: 0 0 30px var(--yellow);
    margin-bottom: 20px;
    animation: rainbow 1s linear infinite;
  }
  #clear-msg {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: clamp(13px, 3.5vw, 18px);
    color: var(--white);
    line-height: 1.8;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 20px;
    margin: 20px 0;
    border-radius: 12px;
    text-align: left;
    min-height: 80px;
    white-space: pre-wrap;
  }
  #loading-msg {
    font-size: clamp(8px, 2.5vw, 11px);
    color: var(--blue);
    animation: blink 0.8s step-end infinite;
  }
  #replay-btn {
    margin-top: 20px;
    background: transparent;
    border: 2px solid var(--green);
    color: var(--green);
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 2.5vw, 11px);
    padding: 12px 24px;
    cursor: pointer;
  }

  /* Confetti */
  .confetti {
    position: fixed;
    width: 10px; height: 10px;
    pointer-events: none;
    animation: fall linear forwards;
  }

  @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes rainbow {
    0%{color:#ff2d78} 20%{color:#ffe600} 40%{color:#00ff88} 60%{color:#00cfff} 80%{color:#bf5fff} 100%{color:#ff2d78}
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<!-- GUIDE / URLメーカー (URLパラメータなし時) -->
<div id="guide-screen">
  <h1>🎮 Birthday Game<br>URLメーカー</h1>
  <p>友達の名前を入れると<br>その人専用のURLができます</p>
  <div id="maker-box">
    <input type="text" id="name-input" placeholder="例：田中さん / 理哉くん" autocomplete="off">
    <div id="genre-label">送る相手は？</div>
    <div id="genre-options">
      <button type="button" class="genre-btn selected" data-genre="friend">
        <span class="genre-emoji">🍻</span>
        <span class="genre-text"><strong>仲良しの友達</strong><br>ラフにいじりつつ全力で祝う</span>
      </button>
      <button type="button" class="genre-btn" data-genre="senpai">
        <span class="genre-emoji">🙏</span>
        <span class="genre-text"><strong>年上の先輩</strong><br>気楽に、でも敬意を忘れずに</span>
      </button>
      <button type="button" class="genre-btn" data-genre="kid">
        <span class="genre-emoji">🧒</span>
        <span class="genre-text"><strong>子ども（甥っ子/姪っ子など）</strong><br>ひらがな多めでやさしく</span>
      </button>
    </div>
    <button id="make-btn" onclick="makeUrl()">URLを作る</button>
    <div id="result-area" style="display:none">
      <div id="result-url"></div>
      <button id="copy-btn" onclick="copyUrl()">📋 URLをコピー</button>
      <a id="test-link" href="#" target="_blank">▶ 動作チェック（新しいタブで開く）</a>
    </div>
  </div>
</div>

<!-- TITLE -->
<div id="title-screen">
  <h1 id="title-heading"></h1>
  <p id="title-subtitle"></p>
  <button id="start-btn" onclick="startGame()">▶ START</button>
</div>

<!-- GAME -->
<div id="game-screen">
  <div id="hud">
    <span>SCORE: <span id="score">0</span></span>
    <span>❤️ <span id="lives">1</span></span>
  </div>
  <canvas id="canvas"></canvas>
  <div id="controls">
    <button class="ctrl-btn" id="left-btn">◀</button>
    <button class="ctrl-btn" id="fire-btn">FIRE</button>
    <button class="ctrl-btn" id="right-btn">▶</button>
  </div>
</div>

<!-- CLEAR -->
<div id="clear-screen">
  <div id="clear-title">🎉 MISSION COMPLETE!! 🎉</div>
  <div id="clear-msg">
    <span id="loading-msg">Claudeがメッセージを考え中...</span>
  </div>
  <button id="replay-btn" onclick="location.reload()">🔄 もう一回遊ぶ</button>
</div>

<script>
/* =====================================================================
   ▼▼▼ 使い方（もうファイル編集は不要です！）▼▼▼

   【仕組み】
   友達の名前はURL自体に埋め込まれます。ファイルの書き換えや
   GitHubへの再アップロードは一切不要です。

   【友達に送るURLの作り方】
   1. パラメータなしでこのページを開く
        例： https://machonohub.github.io/my-website/
      → 「URLメーカー」画面が出るので、名前を入れてURLをコピー
   2. できたURLをそのまま友達に送るだけ！
        例： https://machonohub.github.io/my-website/?b=5paw6Jek44GV44KT

   ※ 手打ちで作りたい場合は  ?n=名前&g=ジャンル  でもOK
     （例：?n=田中さん&g=friend　ジャンルは friend / senpai / kid）
   ※ 昔の  ?p=shindo / ?p=michiya  形式のURLもそのまま動きます
   ※ メッセージ文面を変えたいときは下の GENRES を編集
     （{name} の部分に友達の名前が入ります）
   ===================================================================== */

// 送る相手のジャンルごとの設定。
// messages の中からランダムで1つ表示されます（{name}＝友達の名前）
const GENRES = {

  // -------- 🍻 仲良しの友達（ラフに、でも全力で祝う） --------
  friend: {
    subtitle: "エイリアンを全滅させると<br>大切なメッセージが届くよ👾",
    messages: [
      `{name}へ 🎮\n\nエイリアン全滅させたって？やるじゃん…正直ちょっとビビってる。\nその腕前に敬意を表しつつ、今日は言わせてくれ。\n誕生日おめでとう！！今年も一緒にくだらないことして笑おうな🎉`,

      `{name}へ 👾\n\nゲームクリアおめでとう。そして誕生日おめでとう。\nおめでとうが渋滞してるけど、どっちも本気のやつです。\n{name}が生まれてきてくれた日に、宇宙人退治までしてくれてありがとう🛸✨`,

      `{name}へ 🎂\n\nこのゲーム、何回目のチャレンジでクリアした？\n1回目なら天才。5回目なら努力の人。10回目なら…その執念が大好きだ。\nとにかく誕生日おめでとう！今日はケーキ食べて優勝してくれ🍰`,

      `{name}へ 🚀\n\n地球の平和を守ってくれてありがとう。宇宙警備隊から表彰状が届く予定です（届きません）。\n冗談はさておき、{name}の誕生日を祝えるのが毎年ちょっと嬉しい。\nおめでとう！最高の一年にしような🎉`,

      `{name}へ 🌟\n\nエイリアンより手強いのは日々のあれこれだけど、{name}なら余裕でクリアできるって知ってる。\n誕生日おめでとう！今日くらいは全部忘れて、思いっきり祝われてくれ🥳`
    ]
  },

  // -------- 🙏 年上の先輩（気楽に、でも敬意を忘れずに） --------
  senpai: {
    subtitle: "エイリアンを全滅させると<br>特別なメッセージが届きます👾",
    messages: [
      `{name}へ 🎮\n\nお見事です…！エイリアンたちも「この人には勝てない」と口々に言っていました。\nそんな頼れる{name}のお誕生日、後輩として全力でお祝いさせてください。\nお誕生日おめでとうございます！今年も背中を追いかけます🎉`,

      `{name}へ 👾\n\nゲームまで華麗にクリアされるとは…もう尊敬しかありません。\n日頃の感謝を込めて、このゲームを贈らせていただきました。\nお誕生日おめでとうございます！素敵な一年になりますように✨`,

      `{name}へ 🎂\n\n仕事もゲームも一流とは、ずるいくらいかっこいいです。\nいつも助けていただいてばかりなので、今日は思いきり祝わせてください。\nお誕生日おめでとうございます！今日は主役なので、たっぷり祝われてください🎊`,

      `{name}へ 🚀\n\nインベーダー撃退、お疲れさまでした！おかげで地球は今日も平和です。\n{name}とご一緒する時間はいつも楽しくて、勝手に元気をもらっています。\nお誕生日おめでとうございます！これからもよろしくお願いします😊`,

      `{name}へ 🌟\n\nゲームクリアおめでとうございます！そしてお誕生日おめでとうございます！\nおめでとうを2回も言える今日は、こちらまで嬉しくなる特別な日です。\n{name}にとって最高の一年になりますように🥳`
    ]
  },

  // -------- 🧒 子ども（甥っ子/姪っ子など。ひらがな多めでやさしく） --------
  kid: {
    subtitle: "エイリアンをぜんぶたおすと<br>だいじなメッセージがとどくよ👾",
    messages: [
      `{name}へ 🎮\n\nエイリアンをぜんぶやっつけたね！すごい！つよい！かっこいい！\nちきゅうをまもってくれてありがとう。\nそして…おたんじょうびおめでとう！！🎂 ことしもいっぱいあそぼうね🎉`,

      `{name}へ 👾\n\nゲームクリアおめでとう！{name}はゲームのてんさいかもしれない…！\nきょうは{name}がうまれてきてくれた、とくべつな日。\nおたんじょうびおめでとう！すてきな1年になりますように🥳`,

      `{name}へ 🚀\n\nうちゅうのエイリアンたちが「{name}にはかなわない〜！」ってにげていったよ。\nそんなヒーローの{name}、おたんじょうびおめでとう！\nケーキをいっぱいたべて、もっとつよくなってね🍰`,

      `{name}へ 🌟\n\nすごいすごい！エイリアンをぜんぶたおしちゃった！\nがんばった{name}に、とっておきのことばをおくるね。\n「おたんじょうびおめでとう！！」🎉 ことしもえがおいっぱいですごしてね😊`,

      `{name}へ 🎂\n\nゲームクリア、おめでとう！{name}のゆうきとがんばりに、はくしゅ〜！👏\nそして、おたんじょうびおめでとう！\nこれからも、すきなことをいっぱいたのしんでね🥳`
    ]
  }

};
const DEFAULT_GENRE = "friend";

// 昔の ?p=ID 形式との互換用（ID → 表示名）。新しく増やす必要はありません
const LEGACY_PEOPLE = {
  shindo:  "新藤さん",
  michiya: "理哉くん"
};

// 名前とジャンルからゲーム設定を組み立てる
function buildConfig(name, genre) {
  const g = GENRES[genre] || GENRES[DEFAULT_GENRE];
  return {
    pageTitle:    `${name}へ`,
    titleHeading: `🎮 ${name}へ<br>ミッション開始！`,
    subtitle:     g.subtitle,
    messages: g.messages.map(t => t.replaceAll("{name}", name))
  };
}

// 名前 ⇔ URL用文字列（Base64url）の変換
function encodeName(name) {
  const bytes = new TextEncoder().encode(name);
  let bin = "";
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
function decodeName(str) {
  try {
    const b64 = str.replace(/-/g, "+").replace(/_/g, "/");
    const bin = atob(b64);
    return new TextDecoder().decode(Uint8Array.from(bin, c => c.charCodeAt(0)));
  } catch (e) {
    return null;
  }
}

// 共通テーマカラー（基本変えなくてOK。全員に効きます）
const THEME_COLORS = {
  bg:     "#0a0a1a",
  green:  "#00ff88",
  pink:   "#ff2d78",
  yellow: "#ffe600",
  blue:   "#00cfff"
};

/* =====================================================================
   ▲▲▲ 書き換えはここまで。これより下は触らなくてOKです ▲▲▲
   ===================================================================== */

// ---- URLパラメータから対象者を判定 ----
// 名前： ?b=（Base64エンコード名） → ?n=（名前そのまま） → ?p=（旧ID形式）
// ジャンル： ?g=friend / senpai / kid（なければ friend）
const urlParams = new URLSearchParams(window.location.search);
let friendName = null;
if (urlParams.get('b')) {
  friendName = decodeName(urlParams.get('b'));
} else if (urlParams.get('n')) {
  friendName = urlParams.get('n').trim() || null;
} else if (urlParams.get('p')) {
  friendName = LEGACY_PEOPLE[urlParams.get('p')] || null;
}
const friendGenre = urlParams.get('g') || DEFAULT_GENRE;
const CONFIG = friendName ? buildConfig(friendName, friendGenre) : null;

// テーマカラーを反映（全画面共通）
const root = document.documentElement;
root.style.setProperty('--bg',     THEME_COLORS.bg);
root.style.setProperty('--green',  THEME_COLORS.green);
root.style.setProperty('--pink',   THEME_COLORS.pink);
root.style.setProperty('--yellow', THEME_COLORS.yellow);
root.style.setProperty('--blue',   THEME_COLORS.blue);

if (!CONFIG) {
  // ---- パラメータなし or 解読失敗 → URLメーカー画面を表示 ----
  document.title = "Birthday Game URLメーカー";
  document.body.classList.add('scrollable');
  document.getElementById('guide-screen').style.display = 'block';
} else {
  // ---- 該当者あり → 通常のタイトル画面を表示 ----
  document.title = CONFIG.pageTitle;
  document.getElementById('title-heading').innerHTML = CONFIG.titleHeading;
  document.getElementById('title-subtitle').innerHTML = CONFIG.subtitle;
  document.getElementById('title-screen').style.display = 'block';
}

// ---- URLメーカー ----
let generatedUrl = "";
let selectedGenre = DEFAULT_GENRE;

// ジャンル選択ボタン
document.querySelectorAll('.genre-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedGenre = btn.dataset.genre;
    // 選択を変えたらURLを作り直してもらう
    if (generatedUrl) makeUrl();
  });
});

function makeUrl() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) {
    document.getElementById('name-input').focus();
    return;
  }
  const base = location.origin + location.pathname;
  generatedUrl = `${base}?b=${encodeName(name)}&g=${selectedGenre}`;
  document.getElementById('result-url').textContent = generatedUrl;
  document.getElementById('test-link').href = generatedUrl;
  document.getElementById('result-area').style.display = 'block';
}

async function copyUrl() {
  if (!generatedUrl) return;
  const btn = document.getElementById('copy-btn');
  try {
    await navigator.clipboard.writeText(generatedUrl);
    btn.textContent = "✅ コピーしました！";
  } catch (e) {
    // クリップボードが使えない環境向けのフォールバック
    const ta = document.createElement('textarea');
    ta.value = generatedUrl;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    btn.textContent = "✅ コピーしました！";
  }
  setTimeout(() => { btn.textContent = "📋 URLをコピー"; }, 2000);
}

const nameInput = document.getElementById('name-input');
if (nameInput) {
  nameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') makeUrl();
  });
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Canvas size
const W = Math.min(380, window.innerWidth * 0.96);
const H = Math.min(560, window.innerHeight * 0.65);
canvas.width = W;
canvas.height = H;

// エイリアン設定（小さめサイズ、バラバラ動作）
const ALIEN_W = Math.floor(W / 18);
const ALIEN_H = Math.floor(ALIEN_W * 0.9);
const ALIEN_COUNT = 8;

let state = {
  player: { x: W/2, y: H - 30, w: 32, h: 14, speed: 4 },
  bullets: [],
  alienBullets: [],
  aliens: [],
  score: 0,
  lives: 1,
  gameOver: false,
  cleared: false,
  keys: {},
  touchLeft: false,
  touchRight: false,
  touchFire: false,
  lastFire: 0,
  lastAlienFire: 0,
  animFrame: 0,
};

function initAliens() {
  state.aliens = [];
  for(let i = 0; i < ALIEN_COUNT; i++) {
    // 画面上部にランダム配置（Y固定、下降なし）
    const row = Math.floor(i / 4);
    state.aliens.push({
      x: 20 + Math.random() * (W - 60),
      y: 30 + row * 60,
      w: ALIEN_W, h: ALIEN_H,
      alive: true,
      vx: (Math.random() * 0.7 + 0.4) * (Math.random() < 0.5 ? 1 : -1),
      type: i % 2,
    });
  }
}

function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  initAliens();
  requestAnimationFrame(loop);
}

// Keyboard
document.addEventListener('keydown', e => { state.keys[e.key] = true; });
document.addEventListener('keyup', e => { state.keys[e.key] = false; });

// Touch controls
function addTouch(id, prop) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart', e => { e.preventDefault(); state[prop] = true; }, {passive:false});
  el.addEventListener('touchend', e => { e.preventDefault(); state[prop] = false; }, {passive:false});
  el.addEventListener('mousedown', () => state[prop] = true);
  el.addEventListener('mouseup', () => state[prop] = false);
}
addTouch('left-btn', 'touchLeft');
addTouch('right-btn', 'touchRight');
addTouch('fire-btn', 'touchFire');

function drawPlayer(p) {
  ctx.fillStyle = THEME_COLORS.green;
  // Body
  ctx.fillRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h);
  // Gun
  ctx.fillRect(p.x - 3, p.y - p.h/2 - 7, 6, 8);
  // Legs
  ctx.fillRect(p.x - p.w/2, p.y + p.h/2 - 4, 8, 4);
  ctx.fillRect(p.x + p.w/2 - 8, p.y + p.h/2 - 4, 8, 4);
}

function drawAlien(a, frame) {
  if (!a.alive) return;
  ctx.save();
  ctx.translate(a.x + a.w/2, a.y + a.h/2);
  const colors = [THEME_COLORS.pink, THEME_COLORS.yellow, THEME_COLORS.blue];
  ctx.fillStyle = colors[a.type];
  const f = frame % 2;
  if (a.type === 2) {
    // UFO type
    ctx.beginPath();
    ctx.ellipse(0, 2, a.w/2, a.h/3, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillRect(-a.w/4, -a.h/2, a.w/2, a.h/2);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(0, 0, a.w/5, a.h/5, 0, 0, Math.PI*2);
    ctx.fill();
  } else if (a.type === 1) {
    // Crab type
    ctx.fillRect(-a.w/2+2, -a.h/4, a.w-4, a.h/2);
    ctx.fillRect(-a.w/3, -a.h/2, a.w*2/3, a.h/3);
    // antennae
    ctx.fillRect(-a.w/2 + (f?2:0), -a.h/2 - 4, 3, 5);
    ctx.fillRect(a.w/2 - 5 - (f?2:0), -a.h/2 - 4, 3, 5);
    // legs
    ctx.fillRect(-a.w/2 - (f?3:0), a.h/4, 4, 3);
    ctx.fillRect(a.w/2-4 + (f?3:0), a.h/4, 4, 3);
  } else {
    // Squid type
    ctx.fillRect(-a.w/3, -a.h/2, a.w*2/3, a.h);
    ctx.fillRect(-a.w/2, -a.h/4, a.w, a.h/2);
    ctx.fillStyle = colors[0];
    const ey = f ? -2 : 0;
    ctx.fillRect(-a.w/5, -a.h/4 + ey, 4, 4);
    ctx.fillRect(a.w/5-4, -a.h/4 + ey, 4, 4);
  }
  ctx.restore();
}

function loop(ts) {
  if (state.gameOver || state.cleared) return;

  // Input
  const p = state.player;
  const spd = p.speed * (W / 380);
  if ((state.keys['ArrowLeft'] || state.keys['a']) || state.touchLeft) p.x = Math.max(p.w/2, p.x - spd);
  if ((state.keys['ArrowRight'] || state.keys['d']) || state.touchRight) p.x = Math.min(W - p.w/2, p.x + spd);

  const canFire = ts - state.lastFire > 400;
  if (((state.keys[' '] || state.keys['z']) || state.touchFire) && canFire) {
    state.bullets.push({ x: p.x, y: p.y - p.h/2, vy: -7 });
    state.lastFire = ts;
  }

  // Move bullets
  state.bullets = state.bullets.filter(b => b.y > -10);
  state.bullets.forEach(b => b.y += b.vy);

  // Alien fire（頻度さらにアップ）
  const aliveAliens = state.aliens.filter(a => a.alive);
  if (aliveAliens.length > 0 && ts - state.lastAlienFire > Math.max(400, 900 - state.score * 2)) {
    const shooter = aliveAliens[Math.floor(Math.random() * aliveAliens.length)];
    state.alienBullets.push({ x: shooter.x + shooter.w/2, y: shooter.y + shooter.h, vy: 3 });
    state.lastAlienFire = ts;
  }
  state.alienBullets = state.alienBullets.filter(b => b.y < H + 10);
  state.alienBullets.forEach(b => b.y += b.vy);

  // Move aliens（各自バラバラにX方向のみ動く・下降なし）
  state.animFrame = Math.floor(ts / 500) % 2;
  aliveAliens.forEach(a => {
    a.x += a.vx;
    if (a.x < 0) { a.x = 0; a.vx *= -1; }
    if (a.x + a.w > W) { a.x = W - a.w; a.vx *= -1; }
  });

  // Collision: player bullets vs aliens
  state.bullets.forEach(b => {
    state.aliens.forEach(a => {
      if (!a.alive) return;
      if (b.x > a.x && b.x < a.x + a.w && b.y > a.y && b.y < a.y + a.h) {
        a.alive = false;
        b.y = -999;
        state.score += (a.type + 1) * 10;
        document.getElementById('score').textContent = state.score;
      }
    });
  });

  // Collision: alien bullets vs player
  state.alienBullets.forEach(b => {
    if (Math.abs(b.x - p.x) < p.w/2 && Math.abs(b.y - p.y) < p.h/2) {
      b.y = 9999;
      state.lives--;
      document.getElementById('lives').textContent = state.lives;
      if (state.lives <= 0) { state.gameOver = true; }
    }
  });

  // Clear check
  if (aliveAliens.length === 0) {
    state.cleared = true;
    showClear();
    return;
  }

  // Draw
  ctx.clearRect(0, 0, W, H);
  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for(let i=0;i<30;i++){
    const sx = (i*73+ts*0.01*((i%3)+0.5)) % W;
    const sy = (i*97) % H;
    ctx.fillRect(sx,sy,1,1);
  }

  drawPlayer(p);
  state.aliens.forEach(a => drawAlien(a, state.animFrame));

  // Bullets
  ctx.fillStyle = THEME_COLORS.green;
  state.bullets.forEach(b => ctx.fillRect(b.x-2, b.y, 4, 10));
  ctx.fillStyle = THEME_COLORS.pink;
  state.alienBullets.forEach(b => { ctx.fillRect(b.x-2, b.y, 4, 12); });

  // Game over オーバーレイ（描画後に表示すると、最後のシーンの上にGAME OVERが残る）
  if (state.gameOver) {
    showGameOver();
    return;
  }

  requestAnimationFrame(loop);
}

function showGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle = THEME_COLORS.pink;
  ctx.font = `${Math.floor(W/15)}px 'Press Start 2P'`;
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W/2, H/2 - 20);
  ctx.font = `${Math.floor(W/25)}px 'Press Start 2P'`;
  ctx.fillStyle = '#ffffff';
  ctx.fillText('TAP TO RETRY', W/2, H/2 + 20);
  canvas.addEventListener('click', () => location.reload(), {once:true});
}

function showClear() {
  // Confetti!
  for(let i=0;i<80;i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = Math.random()*100+'vw';
      el.style.top = '-20px';
      el.style.background = ['#ff2d78','#ffe600','#00ff88','#00cfff','#bf5fff'][Math.floor(Math.random()*5)];
      el.style.borderRadius = Math.random()>0.5?'50%':'0';
      el.style.animationDuration = (1.5+Math.random()*2)+'s';
      el.style.animationDelay = (Math.random()*1)+'s';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 4000);
    }, i*30);
  }

  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('clear-screen').style.display = 'block';

  fetchBirthdayMessage();
}

async function fetchBirthdayMessage() {
  if (!CONFIG) return;
  const messages = CONFIG.messages;
  const msg = messages[Math.floor(Math.random() * messages.length)];
  document.getElementById('loading-msg').style.display = 'none';
  document.getElementById('clear-msg').textContent = msg;
}
</script>
